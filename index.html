<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses – Sampathirao Yoganandh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #1A1816;
      color: #F0EDE8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .profile-card {
      background-color: #24211E;
      border: 1px solid #3D3835;
      border-radius: 14px;
      padding: 48px 52px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .profile-photo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #E8834A;
      margin-bottom: 24px;
    }

    .profile-name {
      font-size: 1.6em;
      font-weight: bold;
      color: #F0EDE8;
      margin-bottom: 6px;
      text-transform: capitalize;
    }

    .profile-title {
      font-size: 1.05em;
      color: #E8C9A0;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .profile-branch {
      font-size: 0.93em;
      color: #C8C4BE;
      margin-bottom: 4px;
    }

    .profile-org {
      font-size: 0.95em;
      color: #9E9A94;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #E8834A;
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    .course-btn {
      display: inline-block;
      padding: 12px 36px;
      background-color: #E8834A;
      color: #1A1816;
      font-size: 0.98em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .course-btn:hover {
      background-color: #F5A472;
    }

    .course-label {
      font-size: 0.85em;
      color: #6E6A64;
      margin-top: 12px;
    }

    .courses-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .course-item {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1E1B18;
      border: 1px solid #3D3835;
      border-radius: 10px;
      padding: 14px 18px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .course-item:hover {
      border-color: #E8834A;
      background: #26221F;
    }

    .course-item-icon {
      font-size: 1.6em;
      flex-shrink: 0;
    }

    .course-item-info {
      text-align: left;
      flex: 1;
    }

    .course-item-name {
      font-size: 0.92em;
      font-weight: 700;
      color: #F0EDE8;
      margin-bottom: 3px;
    }

    .course-item-code {
      font-size: 0.78em;
      color: #9E9A94;
    }

    .course-item-arrow {
      color: #E8834A;
      font-size: 1.1em;
      flex-shrink: 0;
    }

    .coming-soon {
      opacity: 0.5;
      cursor: default;
      pointer-events: none;
    }

    .badge-soon {
      font-size: 0.7em;
      background: #3D3835;
      color: #9E9A94;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .auth-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #3D3835;
    }

    .auth-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.82em;
      font-weight: 600;
      text-decoration: none;
      transition: 0.2s;
      cursor: pointer;
      border: none;
    }

    .auth-btn-login {
      background: #E8834A;
      color: #1A1816;
    }
    .auth-btn-login:hover { background: #F5A472; }

    .auth-btn-dash {
      background: rgba(78,203,160,.15);
      border: 1px solid rgba(78,203,160,.3);
      color: #4ECBA0;
    }
    .auth-btn-dash:hover { background: rgba(78,203,160,.25); }

    .auth-btn-admin {
      background: rgba(240,124,62,.12);
      border: 1px solid rgba(240,124,62,.3);
      color: #F07C3E;
    }
    .auth-btn-admin:hover { background: rgba(240,124,62,.22); }

    .auth-btn-logout {
      background: rgba(240,92,92,.1);
      border: 1px solid rgba(240,92,92,.3);
      color: #F05C5C;
    }
    .auth-btn-logout:hover { background: rgba(240,92,92,.2); }

    .auth-user-name {
      font-size: 0.78em;
      color: #9E9A94;
      align-self: center;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <img class="profile-photo" src="profile.JPEG" alt="Sampathirao Yoganandh">
    <div class="profile-name">Sampathirao Yoganandh</div>
    <div class="profile-title">Assistant Professor</div>
    <div class="profile-branch">CSE (AI &amp; ML)</div>
    <div class="profile-org">ANITS Engineering College</div>
    <div class="divider"></div>
    <div class="courses-grid">
      <a class="course-item" href="courses.html">
        <div class="course-item-icon">☕</div>
        <div class="course-item-info">
          <div class="course-item-name">Java Programming Practices</div>
          <div class="course-item-code">23CM9201 · R23 Regulation · CSE (AI &amp; ML)</div>
        </div>
        <div class="course-item-arrow">→</div>
      </a>
      <a class="course-item coming-soon" href="#">
        <div class="course-item-icon">🐍</div>
        <div class="course-item-info">
          <div class="course-item-name">Python Programming <span class="badge-soon">Coming Soon</span></div>
          <div class="course-item-code">23CM9202 · R23 Regulation · CSE (AI &amp; ML)</div>
        </div>
        <div class="course-item-arrow">→</div>
      </a>
      <a class="course-item" href="devops_courses.html">
        <div class="course-item-icon">🛠️</div>
        <div class="course-item-info">
          <div class="course-item-name">DevOps</div>
          <div class="course-item-code">23CM9205 · R23 Regulation · CSE (AI &amp; ML)</div>
        </div>
        <div class="course-item-arrow">→</div>
      </a>
    </div>

    <!-- Auth bar: shown/hidden by JS -->
    <div class="auth-bar" id="authBar">
      <a class="auth-btn auth-btn-login" href="login.html" id="btnLogin">🔐 Login</a>
    </div>

  </div>

<script>
  const token = localStorage.getItem('edu_token');
  const user  = JSON.parse(localStorage.getItem('edu_user') || '{}');
  const bar   = document.getElementById('authBar');

  // Redirect to login if not logged in
  if (!token) { window.location.href = 'login.html'; }

  if (token && user.name) {
    if (user.role === 'admin') {
      bar.innerHTML = `
        <span class="auth-user-name">👤 ${user.name}</span>
        <a class="auth-btn auth-btn-admin" href="admin.html">⚙️ Admin Panel</a>
        <button class="auth-btn auth-btn-logout" onclick="logout()">Logout</button>
      `;
    } else {
      bar.innerHTML = `
        <span class="auth-user-name">👤 ${user.name}</span>
        <a class="auth-btn auth-btn-dash" href="dashboard.html">📊 My Dashboard</a>
        <button class="auth-btn auth-btn-logout" onclick="logout()">Logout</button>
      `;
    }
  }

  function logout() {
    localStorage.removeItem('edu_token');
    localStorage.removeItem('edu_user');
    location.reload();
  }
</script>

</body>
</html>
