<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Java Programming – Sampathirao Yoganandh</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #1A1816;
      color: #F0EDE8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .profile-card {
      background-color: #24211E;
      border: 1px solid #3D3835;
      border-radius: 14px;
      padding: 48px 52px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .profile-photo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid #E8834A;
      margin-bottom: 24px;
    }

    .profile-name {
      font-size: 1.6em;
      font-weight: bold;
      color: #F0EDE8;
      margin-bottom: 6px;
      text-transform: capitalize;
    }

    .profile-title {
      font-size: 1.05em;
      color: #E8C9A0;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .profile-org {
      font-size: 0.95em;
      color: #9E9A94;
      margin-bottom: 32px;
    }

    .divider {
      width: 60px;
      height: 2px;
      background-color: #E8834A;
      margin: 0 auto 32px;
      border-radius: 2px;
    }

    .course-btn {
      display: inline-block;
      padding: 12px 36px;
      background-color: #E8834A;
      color: #1A1816;
      font-size: 0.98em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .course-btn:hover {
      background-color: #F5A472;
    }

    .course-label {
      font-size: 0.85em;
      color: #6E6A64;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <img class="profile-photo" src="profile.jpg" alt="Sampathirao Yoganandh">
    <div class="profile-name">Sampathirao Yoganandh</div>
    <div class="profile-title">Assistant Professor</div>
    <div class="profile-org">ANITS Engineering College</div>
    <div class="divider"></div>
    <a class="course-btn" href="courses.html">View Java Programming Course</a>
    <div class="course-label">11 Topics &nbsp;·&nbsp; Quizzes Included</div>
  </div>

</body>
</html>
