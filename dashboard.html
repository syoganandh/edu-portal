<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Dashboard — Sampathirao Yoganandh</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0F1117;--surf:#181C27;--surf2:#1F2333;--bdr:#2A2F42;--acc:#F07C3E;--gold:#E8C06A;--txt:#E8EAF0;--muted:#6B7194;--grn:#4ECBA0;--blu:#5BA8F5;--red:#F05C5C;--prp:#A97DF5}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
a{color:var(--acc);text-decoration:none}

.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:12px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.brand{font-weight:700;color:var(--gold);font-size:.95em}
.nav-links{display:flex;gap:8px;margin-left:auto;align-items:center}
.nav-btn{padding:7px 14px;border:1px solid var(--bdr);border-radius:7px;font-size:.8em;color:var(--muted);background:none;cursor:pointer;transition:.2s}
.nav-btn:hover,.nav-btn.active{border-color:var(--acc);color:var(--txt)}
.logout-btn{background:rgba(240,92,92,.1);border-color:rgba(240,92,92,.3);color:var(--red)}
.logout-btn:hover{background:rgba(240,92,92,.2)}

.hero{padding:36px 40px 28px;background:linear-gradient(135deg,#181C27 60%,#1a1225)}
.hello{font-size:.8em;color:var(--muted);margin-bottom:4px}
.hero h1{font-size:1.8em;font-weight:800;background:linear-gradient(120deg,#E8EAF0 40%,#E8C06A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.roll-badge{display:inline-block;padding:3px 12px;background:rgba(91,168,245,.12);border:1px solid rgba(91,168,245,.3);color:var(--blu);border-radius:20px;font-size:.75em;font-weight:700;margin-top:8px}

.main{max-width:1100px;margin:0 auto;padding:32px 40px 60px}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:20px;text-align:center}
.stat-val{font-size:2em;font-weight:800;margin-bottom:4px}
.stat-label{font-size:.75em;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

.section-title{font-size:.7em;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;font-weight:700}

/* Progress per topic */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:32px}
.topic-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:16px}
.topic-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.topic-name{font-size:.88em;font-weight:700;color:var(--txt);line-height:1.3}
.course-tag{font-size:.68em;font-weight:700;padding:2px 8px;border-radius:4px}
.tag-jpp{background:rgba(78,203,160,.12);color:var(--grn)}
.tag-devops{background:rgba(169,125,245,.12);color:var(--prp)}
.pct-bar{background:var(--surf2);border-radius:4px;height:6px;margin-bottom:6px;overflow:hidden}
.pct-fill{height:100%;border-radius:4px;transition:.4s}
.topic-meta{display:flex;justify-content:space-between;font-size:.73em;color:var(--muted)}

/* Recent results table */
.results-table{width:100%;border-collapse:collapse;font-size:.85em}
.results-table th{background:var(--surf2);color:var(--gold);padding:10px 14px;text-align:left;border-bottom:2px solid var(--bdr)}
.results-table td{padding:9px 14px;border-bottom:1px solid var(--bdr);color:#C8CAD8}
.results-table tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:700}
.badge-pass{background:rgba(78,203,160,.12);color:var(--grn)}
.badge-fail{background:rgba(240,92,92,.12);color:var(--red)}
.badge-avg{background:rgba(232,192,106,.12);color:var(--gold)}

.empty{text-align:center;padding:48px;color:var(--muted);font-size:.9em}
.empty span{font-size:2.5em;display:block;margin-bottom:10px}

.loading{text-align:center;padding:60px;color:var(--muted)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">sampathirao yoganandh</div>
  <div class="nav-links">
    <a href="index.html" class="nav-btn">🏠 Courses</a>
    <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="hero">
  <div class="hello">Student Dashboard</div>
  <h1 id="heroName">Loading...</h1>
  <div class="roll-badge" id="heroRoll"></div>
</div>

<div class="main">

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-val" id="statAttempts" style="color:var(--acc)">—</div>
      <div class="stat-label">Total Attempts</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statAvg" style="color:var(--grn)">—</div>
      <div class="stat-label">Average Score</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statBest" style="color:var(--gold)">—</div>
      <div class="stat-label">Best Score</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statTopics" style="color:var(--blu)">—</div>
      <div class="stat-label">Topics Covered</div>
    </div>
  </div>

  <div class="section-title">Progress by Topic</div>
  <div class="topic-grid" id="topicGrid">
    <div class="loading">Loading your progress...</div>
  </div>

  <div class="section-title" style="margin-top:8px">Recent Quiz Attempts</div>
  <div style="background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:hidden">
    <table class="results-table">
      <thead><tr><th>Topic</th><th>Course</th><th>Type</th><th>Score</th><th>Result</th><th>Date</th></tr></thead>
      <tbody id="resultsBody"><tr><td colspan="6" class="loading">Loading...</td></tr></tbody>
    </table>
  </div>

</div>

<script>
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:5000/api' : '/api';

  const token = localStorage.getItem('edu_token');
  const user  = JSON.parse(localStorage.getItem('edu_user') || '{}');

  if (!token) { window.location.href = 'login.html'; }
  if (user.role === 'admin') { window.location.href = 'admin.html'; }

  document.getElementById('heroName').textContent = user.name || 'Student';
  document.getElementById('heroRoll').textContent = user.rollNo || '';

  function logout() {
    localStorage.removeItem('edu_token');
    localStorage.removeItem('edu_user');
    window.location.href = 'login.html';
  }

  function getPctColor(pct) {
    if (pct >= 80) return 'var(--grn)';
    if (pct >= 50) return 'var(--gold)';
    return 'var(--red)';
  }

  async function loadDashboard() {
    try {
      const res = await fetch(`${API}/quiz/my`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);

      const { results, summary } = data;

      // Stats
      const attempts = results.length;
      const avg = attempts ? Math.round(results.reduce((s,r)=>s+r.percentage,0)/attempts) : 0;
      const best = attempts ? Math.max(...results.map(r=>r.percentage)) : 0;
      document.getElementById('statAttempts').textContent = attempts;
      document.getElementById('statAvg').textContent = avg + '%';
      document.getElementById('statBest').textContent = best + '%';
      document.getElementById('statTopics').textContent = summary.length;

      // Topic cards
      const grid = document.getElementById('topicGrid');
      if (!summary.length) {
        grid.innerHTML = '<div class="empty"><span>📊</span>No quiz attempts yet.<br>Take a quiz from the Topics tab!</div>';
      } else {
        grid.innerHTML = summary.map(s => `
          <div class="topic-card">
            <div class="topic-header">
              <div class="topic-name">${s.topic}</div>
              <span class="course-tag ${s.course==='JPP'?'tag-jpp':'tag-devops'}">${s.course}</span>
            </div>
            <div class="pct-bar"><div class="pct-fill" style="width:${s.bestPct}%;background:${getPctColor(s.bestPct)}"></div></div>
            <div class="topic-meta">
              <span>Best: <strong style="color:${getPctColor(s.bestPct)}">${s.bestPct}%</strong></span>
              <span>${s.attempts} attempt${s.attempts>1?'s':''}</span>
            </div>
          </div>
        `).join('');
      }

      // Results table
      const tbody = document.getElementById('resultsBody');
      if (!results.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty"><span>📝</span>No attempts yet.</td></tr>';
      } else {
        tbody.innerHTML = results.slice(0,20).map(r => {
          const badge = r.percentage>=80?'badge-pass':r.percentage>=50?'badge-avg':'badge-fail';
          const label = r.percentage>=80?'Pass':r.percentage>=50?'Average':'Fail';
          const date = new Date(r.takenAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});
          return `<tr>
            <td>${r.topic}</td>
            <td><span class="course-tag ${r.course==='JPP'?'tag-jpp':'tag-devops'}">${r.course}</span></td>
            <td style="text-transform:capitalize">${r.quizType}</td>
            <td>${r.score}/${r.total} <span style="color:var(--muted);font-size:.85em">(${r.percentage}%)</span></td>
            <td><span class="badge ${badge}">${label}</span></td>
            <td style="color:var(--muted)">${date}</td>
          </tr>`;
        }).join('');
      }
    } catch(err) {
      console.error(err);
    }
  }

  loadDashboard();
</script>
</body>
</html>
